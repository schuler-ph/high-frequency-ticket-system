name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Quality & Guardrails (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 22, 24 ]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Next.js & Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.turbo
            ${{ github.workspace }}/apps/web/.next/cache
          key: ${{ runner.os }}-turbo-nextjs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration journal guardrail
        run: pnpm run debug:migrations

      - name: buy_ticket contract guardrail
        run: pnpm run debug:buy-ticket-contract

      - name: Lint
        run: pnpm run lint
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Typecheck
        run: pnpm run check-types
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Build
        run: pnpm run build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          NEXT_TELEMETRY_DISABLED: 1

  tests:
    name: Test Suite (Node 24)
    runs-on: ubuntu-latest
    needs: quality
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      NODE_ENV: test
      LOG_LEVEL: warn
      DATABASE_URL: postgres://postgres:postgres@localhost:10006/high_frequency_tickets
      REDIS_URL: redis://localhost:10004
      GOOGLE_CLOUD_PROJECT: high-frequency-ticket-system
      PUBSUB_EMULATOR_HOST: localhost:10005
      PUBSUB_TOPIC_BUY_TICKET: buy-ticket
      PUBSUB_SUBSCRIPTION_BUY_TICKET: buy-ticket-worker

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: high_frequency_tickets
        ports:
          - 10006:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 10004:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start Pub/Sub emulator
        run: |
          docker run -d --name hts-pubsub \
            -p 10005:8085 \
            gcr.io/google.com/cloudsdktool/cloud-sdk:emulators \
            gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
          timeout 60 bash -c 'until nc -z localhost 10005; do sleep 2; done'

      - name: Build @repo/env
        run: pnpm --filter @repo/env run build
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Apply DB migrations
        run: pnpm --filter @repo/db run db:migrate

      - name: Run tests
        run: CI=1 pnpm run test:ci
        env:
          TURBO_TELEMETRY_DISABLED: 1
