name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: Quality & Guardrails (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [ 22, 24 ]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Next.js & Turborepo cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.turbo
            ${{ github.workspace }}/apps/web/.next/cache
          key: ${{ runner.os }}-turbo-nextjs-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-nextjs-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migration journal guardrail
        run: pnpm run debug:migrations

      - name: buy_ticket contract guardrail
        run: pnpm run debug:buy-ticket-contract

      - name: Lint
        run: pnpm run lint
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Typecheck
        run: pnpm run check-types
        env:
          TURBO_TELEMETRY_DISABLED: 1

      - name: Build
        run: pnpm run build
        env:
          TURBO_TELEMETRY_DISABLED: 1
          NEXT_TELEMETRY_DISABLED: 1

  tests:
    name: Test Suite (Node 24)
    runs-on: ubuntu-latest
    needs: quality
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: CI=1 pnpm run test
        env:
          TURBO_TELEMETRY_DISABLED: 1
