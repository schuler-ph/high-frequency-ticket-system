global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["host.docker.internal:10002"]

  - job_name: worker
    static_configs:
      - targets: ["host.docker.internal:10003"]

  # redis_exporter runs inside the compose network; scrape it by service name.
  - job_name: redis
    static_configs:
      - targets: ["redis_exporter:9121"]
